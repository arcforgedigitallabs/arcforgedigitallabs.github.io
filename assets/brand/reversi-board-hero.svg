<?xml version="1.0" encoding="UTF-8"?>
<!--
  Reversi (Othello) board - brand visual for the landing-page hero.
  This is NOT a screenshot of the iOS app; it is a clean rendering of
  the game itself (an 8x8 Othello board in the standard starting
  position) used as a generic brand graphic until Phase 32 ships
  curated App Store screenshots. Palette mirrors assets/css/tokens.css.
-->
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1024"
    height="1024"
    viewBox="0 0 1024 1024"
    fill="none"
    role="img"
    aria-label="Reversi board in the standard starting position"
>
    <defs>
        <radialGradient id="ambient" cx="50%" cy="42%" r="65%">
            <stop offset="0%" stop-color="#1f6f33" stop-opacity="1"/>
            <stop offset="100%" stop-color="#16562a" stop-opacity="1"/>
        </radialGradient>
        <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0f4520"/>
            <stop offset="100%" stop-color="#072c12"/>
        </linearGradient>
        <radialGradient id="bgGlow" cx="50%" cy="0%" r="80%">
            <stop offset="0%" stop-color="#4ade80" stop-opacity="0.18"/>
            <stop offset="65%" stop-color="#0a0a0f" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="blackPiece" cx="38%" cy="32%" r="65%">
            <stop offset="0%" stop-color="#3a3a44"/>
            <stop offset="55%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        <radialGradient id="whitePiece" cx="38%" cy="32%" r="65%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="60%" stop-color="#f5f5f5"/>
            <stop offset="100%" stop-color="#c2c2c8"/>
        </radialGradient>
        <filter id="pieceShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" in="SourceAlpha"/>
            <feOffset dy="6"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.45"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="1024" height="1024" fill="#0a0a0f"/>
    <rect width="1024" height="1024" fill="url(#bgGlow)"/>

    <rect x="56" y="56" width="912" height="912" rx="56"
        fill="url(#frame)"/>
    <rect x="92" y="92" width="840" height="840" rx="32"
        fill="url(#ambient)"/>

    <g stroke="#3d9a52" stroke-opacity="0.55" stroke-width="2">
        <line x1="197" y1="92"  x2="197" y2="932"/>
        <line x1="302" y1="92"  x2="302" y2="932"/>
        <line x1="407" y1="92"  x2="407" y2="932"/>
        <line x1="512" y1="92"  x2="512" y2="932"/>
        <line x1="617" y1="92"  x2="617" y2="932"/>
        <line x1="722" y1="92"  x2="722" y2="932"/>
        <line x1="827" y1="92"  x2="827" y2="932"/>
        <line x1="92" y1="197" x2="932" y2="197"/>
        <line x1="92" y1="302" x2="932" y2="302"/>
        <line x1="92" y1="407" x2="932" y2="407"/>
        <line x1="92" y1="512" x2="932" y2="512"/>
        <line x1="92" y1="617" x2="932" y2="617"/>
        <line x1="92" y1="722" x2="932" y2="722"/>
        <line x1="92" y1="827" x2="932" y2="827"/>
    </g>

    <g filter="url(#pieceShadow)">
        <circle cx="459.5" cy="459.5" r="42" fill="url(#whitePiece)"
            stroke="#d0d0d0" stroke-width="1.5"/>
        <circle cx="564.5" cy="459.5" r="42" fill="url(#blackPiece)"
            stroke="#000000" stroke-width="1.5"/>
        <circle cx="459.5" cy="564.5" r="42" fill="url(#blackPiece)"
            stroke="#000000" stroke-width="1.5"/>
        <circle cx="564.5" cy="564.5" r="42" fill="url(#whitePiece)"
            stroke="#d0d0d0" stroke-width="1.5"/>
    </g>
</svg>
